spring.application.name=clinic-booking-system

server.port=${PORT:${SERVER_PORT:8085}}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jackson.default-property-inclusion=non_null

app.jwt.secret=${JWT_SECRET:change-this-secret-key-with-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
app.booking.time-zone=${BOOKING_TIME_ZONE:Asia/Kolkata}

notification.twilio.enabled=${TWILIO_ENABLED:false}
notification.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
notification.twilio.from-phone=${TWILIO_FROM_PHONE:}

notification.whatsapp.enabled=${WHATSAPP_ENABLED:false}
notification.whatsapp.api-url=${WHATSAPP_API_URL:}
notification.whatsapp.token=${WHATSAPP_TOKEN:}
notification.whatsapp.from-number=${WHATSAPP_FROM_NUMBER:}
