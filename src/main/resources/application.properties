spring.application.name=clinic-booking-system
server.port=${PORT:8085}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway - Set to false if you don't have V1__ scripts ready
spring.flyway.enabled=false 

spring.jackson.default-property-inclusion=non_null

# Security & JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS - Removed wildcards (Render/Vercel don't like https://*.vercel.app with credentials)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://clinicsphere.vercel.app,https://clinic-app-demo.vercel.app}

# Business Logic
app.booking.time-zone=Asia/Kolkata
app.appointment.eod-zone=Asia/Kolkata
app.appointment.eod-cron=0 10 * * * *
app.session.inactivity-timeout-minutes=30

# Notifications (Disabled by default)
notification.twilio.enabled=false
notification.whatsapp.enabled=false
